name: Build APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Debug - List all files in repo
        run: |
          echo "=== All files in repository ==="
          find . -maxdepth 2 -type f | head -50
          echo "=== Done listing ==="
      
      - name: Move project files from CoCAutoBot folder to root
        run: |
          echo "Checking repository structure..."
          ls -la
          
          # Check if files are inside CoCAutoBot folder
          if [ -d "CoCAutoBot" ]; then
            echo "Found CoCAutoBot folder. Moving files to root..."
            mv CoCAutoBot/* .
            mv CoCAutoBot/.* . 2>/dev/null || true
            rmdir CoCAutoBot 2>/dev/null || true
            echo "Files moved successfully."
          elif [ -f "build.gradle" ] || [ -f "app/build.gradle" ]; then
            echo "Project files already in root. No action needed."
          else
            echo "ERROR: No CoCAutoBot folder and no project files found!"
            echo "Current directory contents:"
            ls -la
            exit 1
          fi
          
          echo "Final project structure:"
          ls -la
          echo "App folder contents:"
          ls -la app/ 2>/dev/null || echo "No app folder found!"
          
      - name: Download Gradle Wrapper JAR
        run: |
          echo "Checking for gradle-wrapper.jar..."
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar missing. Downloading..."
            mkdir -p gradle/wrapper
            curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
            echo "Downloaded gradle-wrapper.jar"
          else
            echo "gradle-wrapper.jar already exists."
          fi
          ls -la gradle/wrapper/
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
